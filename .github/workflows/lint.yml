name: Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff
        run: ruff check scripts/ --select E,W,F --ignore E501

      - name: Check imports compile
        run: |
          pip install -r requirements.txt
          python -c "import pandas, numpy, statsmodels, linearmodels, scipy, matplotlib"
